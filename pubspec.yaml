    - assets/sounds/item_pickup0.ogg
    - assets/sounds/machine_shoot0.ogg
    - assets/sounds/menu_bump.ogg
    - assets/sounds/menu_select.ogg
    - assets/sounds/quad_pickup.ogg
    - assets/sounds/rocket_shoot0.ogg
    - assets/sounds/shield_activate.ogg
    - assets/sounds/shotgun_shoot0.ogg
