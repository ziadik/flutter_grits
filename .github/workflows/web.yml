name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'
      
      - name: Enable Web
        run: flutter config --enable-web
      
      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get
      
      - name: Build Web
        run: |
          # Проверяем версию Flutter и используем правильные флаги
          FLUTTER_VERSION=$(flutter --version | head -n1 | grep -oP '\d+\.\d+\.\d+')
          if [[ "$FLUTTER_VERSION" > "3.16.0" ]]; then
            flutter build web --release --web-renderer html --base-href /flutter_grits/
          else
            flutter build web --release --base-href /flutter_grits/
          fi
      
      - name: Fix missing web files
        run: |
          cd build/web
          # Создаем минимальный manifest.json
          cat > manifest.json << 'EOF'
          {
            "name": "Flutter Grits",
            "short_name": "Grits",
            "start_url": ".",
            "display": "standalone"
          }
          EOF
          
          # Создаем простой favicon
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > favicon.png
          
          # Обновляем index.html
          sed -i 's/<\/body>/<script>if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(function(r){for(let registration of r){registration.unregister()}})}<\/script><\/body>/' index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true